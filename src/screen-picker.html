<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>Choose what to share</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #313338;
      color: #f2f3f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }
    header { padding: 16px 20px 8px; }
    header h1 { font-size: 16px; font-weight: 600; }
    header p { font-size: 12px; color: #b5bac1; margin-top: 2px; }
    main { flex: 1; overflow-y: auto; padding: 8px 20px 12px; }
    .section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; color: #949ba4; margin: 12px 2px 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .source {
      background: #2b2d31;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      text-align: left;
      color: inherit;
      font: inherit;
      transition: border-color 0.12s, background 0.12s;
    }
    .source:hover { background: #35373c; border-color: #5865f2; }
    .source:focus-visible { outline: none; border-color: #5865f2; }
    .thumb {
      width: 100%; aspect-ratio: 16 / 9; object-fit: cover;
      border-radius: 4px; background: #1e1f22; display: block;
    }
    .label { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
    .label img { width: 16px; height: 16px; flex-shrink: 0; }
    .label span {
      font-size: 12px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    footer {
      padding: 12px 20px; display: flex; justify-content: flex-end; gap: 8px;
      border-top: 1px solid #232428;
    }
    button.action {
      font-size: 13px; font-weight: 500; padding: 8px 16px;
      border-radius: 4px; border: none; cursor: pointer;
    }
    .cancel { background: transparent; color: #f2f3f5; }
    .cancel:hover { text-decoration: underline; }
    .empty { color: #949ba4; font-size: 13px; padding: 24px 2px; }
  </style>
</head>
<body>
  <header>
    <h1>Choose what to share</h1>
    <p>Pick a screen or window to share with the channel.</p>
  </header>
  <main id="content">
    <p class="empty">Loading sources…</p>
  </main>
  <footer>
    <button class="action cancel" id="cancel-btn">Cancel</button>
  </footer>

  <script>
    const content = document.getElementById('content');

    document.getElementById('cancel-btn').addEventListener('click', () => {
      window.screenPicker.cancel();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.screenPicker.cancel();
    });

    function makeCard(source) {
      const btn = document.createElement('button');
      btn.className = 'source';
      btn.title = source.name;

      const img = document.createElement('img');
      img.className = 'thumb';
      img.src = source.thumbnail;
      btn.appendChild(img);

      const label = document.createElement('div');
      label.className = 'label';
      if (source.appIcon) {
        const icon = document.createElement('img');
        icon.src = source.appIcon;
        label.appendChild(icon);
      }
      const name = document.createElement('span');
      name.textContent = source.name;
      label.appendChild(name);
      btn.appendChild(label);

      btn.addEventListener('click', () => window.screenPicker.choose(source.id));
      return btn;
    }

    function renderSection(parent, title, items) {
      if (!items.length) return;
      const heading = document.createElement('div');
      heading.className = 'section-label';
      heading.textContent = title;
      parent.appendChild(heading);

      const grid = document.createElement('div');
      grid.className = 'grid';
      for (const s of items) grid.appendChild(makeCard(s));
      parent.appendChild(grid);
    }

    window.screenPicker.getSources().then((sources) => {
      content.innerHTML = '';
      if (!sources.length) {
        content.innerHTML = '<p class="empty">No screens or windows available to share.</p>';
        return;
      }
      renderSection(content, 'Screens', sources.filter((s) => s.isScreen));
      renderSection(content, 'Windows', sources.filter((s) => !s.isScreen));
    });
  </script>
</body>
</html>
