name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Types + lint only — the Electron binary and native modules aren't
      # needed, so skip the (large) binary download for speed.
      - name: Install dependencies
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 bun install

      - name: Type-check
        run: bun run check-types

      - name: Lint
        run: bun run lint
